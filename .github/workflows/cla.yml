# CLA Assistant — requires every contributor to sign the exemu CLA (CLA.md)
# before their pull request can be merged. Signatures are recorded in a JSON
# file on a dedicated branch; a contributor "signs" by commenting the exact
# phrase below on their PR. See CONTRIBUTING.md.
#
# Setup (one-time, by the maintainer):
#   1. Create a Personal Access Token (classic, `repo` scope, or a fine-grained
#      token with Contents read/write on this repo) and add it as the repository
#      secret `PERSONAL_ACCESS_TOKEN`. The action uses it to append to the
#      signatures file. (The built-in GITHUB_TOKEN is also passed for PR
#      comments/labels.)
#   2. That's it — the bot comments on new PRs and blocks them until signed.
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Least-privilege permissions the action needs.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >-
          (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT so the bot can commit signatures to the signatures branch.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where signatures are recorded (on the `cla-signatures` branch, so
          # they never touch main or trigger CI).
          path-to-signatures: "signatures/v1/cla.json"
          branch: "cla-signatures"
          # The document contributors are agreeing to.
          path-to-document: "https://github.com/janDuszynski/exe-emulator/blob/main/CLA.md"
          # The exact phrase a contributor comments to sign.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "✅ All contributors have signed the exemu CLA. Thank you!"
          custom-notsigned-prcomment: >-
            Thanks for your contribution! Before it can be merged, please read
            our [Contributor License Agreement](https://github.com/janDuszynski/exe-emulator/blob/main/CLA.md)
            and sign it by posting the following comment:

            > I have read the CLA Document and I hereby sign the CLA
          # Accounts that never need to sign (the owner and common bots).
          allowlist: "janDuszynski,dependabot[bot],github-actions[bot]"
          # Re-signing is only needed when the CLA version changes.
          lock-pullrequest-aftermerge: false
